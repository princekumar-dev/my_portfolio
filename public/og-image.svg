<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFBFC"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
    <!-- Accent gradients -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Glass effect -->
    <filter id="glass">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(59,130,246,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- Decorative blobs -->
  <circle cx="150" cy="120" r="180" fill="#3B82F6" opacity="0.08" filter="url(#softBlur)"/>
  <circle cx="1050" cy="500" r="160" fill="#06B6D4" opacity="0.08" filter="url(#softBlur)"/>
  <circle cx="900" cy="100" r="120" fill="#8B5CF6" opacity="0.07" filter="url(#softBlur)"/>
  <circle cx="300" cy="550" r="100" fill="#6366F1" opacity="0.06" filter="url(#softBlur)"/>

  <!-- Main content -->
  <!-- Name -->
  <text x="600" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#1f2937" letter-spacing="-1">Prince R</text>

  <!-- Accent line -->
  <rect x="520" y="240" width="160" height="3" rx="1.5" fill="url(#blueGrad)"/>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400" fill="#6b7280" letter-spacing="0.5">AI &amp; Data Science Engineer</text>

  <!-- Skill pills row -->
  <!-- React/Node pill -->
  <rect x="280" y="340" width="180" height="44" rx="22" fill="white" stroke="rgba(59,130,246,0.2)" stroke-width="1" opacity="0.9"/>
  <rect x="280" y="340" width="180" height="44" rx="22" fill="rgba(59,130,246,0.05)"/>
  <circle cx="312" cy="362" r="8" fill="#61dafb" opacity="0.8"/>
  <text x="332" y="367" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#374151">React / Node.js</text>

  <!-- Python/ML pill -->
  <rect x="510" y="340" width="180" height="44" rx="22" fill="white" stroke="rgba(139,92,246,0.2)" stroke-width="1" opacity="0.9"/>
  <rect x="510" y="340" width="180" height="44" rx="22" fill="rgba(139,92,246,0.05)"/>
  <circle cx="542" cy="362" r="8" fill="#3776ab" opacity="0.8"/>
  <text x="562" y="367" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#374151">Python / ML</text>

  <!-- Open to Work pill -->
  <rect x="740" y="340" width="200" height="44" rx="22" fill="white" stroke="rgba(34,197,94,0.25)" stroke-width="1" opacity="0.9"/>
  <rect x="740" y="340" width="200" height="44" rx="22" fill="rgba(34,197,94,0.06)"/>
  <circle cx="772" cy="362" r="6" fill="#22c55e"/>
  <circle cx="772" cy="362" r="6" fill="#22c55e" opacity="0.3">
    <animate attributeName="r" values="6;14;6" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="790" y="367" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#16a34a">Open to Work</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="rgba(243,244,246,0.6)"/>

  <!-- Social links -->
  <!-- GitHub -->
  <circle cx="380" cy="595" r="14" fill="rgba(31,41,55,0.08)"/>
  <text x="380" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">&#x2022;</text>
  <text x="404" y="600" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">github.com/princekumar-dev</text>

  <!-- LinkedIn -->
  <circle cx="680" cy="595" r="14" fill="rgba(59,130,246,0.08)"/>
  <text x="680" y="600" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">&#x2022;</text>
  <text x="704" y="600" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#6b7280">linkedin.com/in/prince-r</text>

  <!-- Decorative corner elements -->
  <rect x="40" y="40" width="60" height="2" rx="1" fill="url(#blueGrad)" opacity="0.4"/>
  <rect x="40" y="40" width="2" height="60" rx="1" fill="url(#blueGrad)" opacity="0.4"/>
  <rect x="1100" y="530" width="60" height="2" rx="1" fill="url(#purpleGrad)" opacity="0.4"/>
  <rect x="1158" y="472" width="2" height="60" rx="1" fill="url(#purpleGrad)" opacity="0.4"/>
</svg>
